  { id: "r11", year: "2026", desc: "SCSC Div3 — TOP 20", badgeText: "TOP 20", badgeColor: "badge-rank" },
  { id: "r12", year: "2026", desc: "KOI 고등부 1차 — 동상", badgeText: "동상", badgeColor: "badge-bronze" }
];

const DEFAULT_TAGS = [
  { id: "tg1", emoji: "📅", text: "2009년 5월생" }
];

let schools = [];
let records = [];
let tags = [];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function waitForFirestore() {
  return new Promise((resolve) => {
    const check = () => {
      if (window.__firestore) resolve(window.__firestore);
      else setTimeout(check, 50);
    };
    check();
  });
}

async function loadData() {
  const { db, doc, getDoc } = await waitForFirestore();
  try {
    const snap = await getDoc(doc(db, 'portfolio', 'records'));
    records = snap.exists() ? snap.data().list : DEFAULT_RECORDS;
  } catch (e) {
    console.error('records load error', e);
    records = DEFAULT_RECORDS;
  }
  try {
    const snap = await getDoc(doc(db, 'portfolio', 'schools'));
    schools = snap.exists() ? snap.data().list : DEFAULT_SCHOOLS;
  } catch (e) {
    console.error('schools load error', e);
    schools = DEFAULT_SCHOOLS;
  }
  try {
    const snap = await getDoc(doc(db, 'portfolio', 'tags'));
    tags = snap.exists() ? snap.data().list : DEFAULT_TAGS;
  } catch (e) {
    console.error('tags load error', e);
    tags = DEFAULT_TAGS;
  }
  render();
}

async function saveRecords() {
  const { db, doc, setDoc } = await waitForFirestore();
  try {
    await setDoc(doc(db, 'portfolio', 'records'), { list: records });
  } catch (e) {
    console.error('records save error', e);
    showToast('저장 실패, 다시 시도해주세요');
  }
}

async function saveSchools() {
  const { db, doc, setDoc } = await waitForFirestore();
  try {
    await setDoc(doc(db, 'portfolio', 'schools'), { list: schools });
  } catch (e) {
    console.error('schools save error', e);
    showToast('저장 실패, 다시 시도해주세요');
  }
}

async function saveTags() {
  const { db, doc, setDoc } = await waitForFirestore();
  try {
    await setDoc(doc(db, 'portfolio', 'tags'), { list: tags });
  } catch (e) {
    console.error('tags save error', e);
    showToast('저장 실패, 다시 시도해주세요');
  }
}

function render() {
  // hero tags
  const heroMeta = document.getElementById('heroMetaContainer');
  heroMeta.innerHTML = '';
  tags.forEach(t => {
    const span = document.createElement('span');
    span.innerHTML = `${t.emoji ? escapeHtml(t.emoji) + ' ' : ''}${escapeHtml(t.text)}${isEditMode ? `<button class="tag-del" data-del-tag="${t.id}">✕</button>` : ''}`;
    heroMeta.appendChild(span);
  });

  // schools
  const schoolCard = document.getElementById('schoolCard');
  schoolCard.innerHTML = '';
  schools.forEach(s => {
    const item = document.createElement('div');
    item.className = 'profile-item';
    item.innerHTML = `
      <div class="profile-label mono">${escapeHtml(s.period)}</div>
      <div class="profile-value">${escapeHtml(s.name)}</div>
      ${isEditMode ? `
        <div class="t-item-actions" style="position:absolute; top:0; right:0;">
          <button class="icon-btn" data-edit-school="${s.id}">✎</button>
          <button class="icon-btn danger" data-del-school="${s.id}">✕</button>
        </div>
      ` : ''}
    `;
    schoolCard.appendChild(item);
  });

  // records grouped by year
  const grouped = {};
  records.forEach(r => {
    if (!grouped[r.year]) grouped[r.year] = [];
    grouped[r.year].push(r);
  });
  const years = Object.keys(grouped).sort((a, b) => a - b);

  const container = document.getElementById('timelineContainer');
  container.innerHTML = '';
  years.forEach(year => {
    const group = document.createElement('div');
    group.className = 't-year-group';
    const itemsHtml = grouped[year].map(r => `
      <div class="t-item">
        <span class="t-badge ${r.badgeColor}">${escapeHtml(r.badgeText)}</span>
        <span class="t-desc">${escapeHtml(r.desc)}</span>
        ${isEditMode ? `
          <div class="t-item-actions">
            <button class="icon-btn" data-edit-record="${r.id}">✎</button>
            <button class="icon-btn danger" data-del-record="${r.id}">✕</button>
          </div>
        ` : ''}
      </div>
    `).join('');
    group.innerHTML = `<div class="t-year">${escapeHtml(year)}</div>${itemsHtml}`;
    container.appendChild(group);
  });

  attachItemListeners();
  document.getElementById('addSchoolBtn').style.display = isEditMode ? 'block' : 'none';
  document.getElementById('addRecordBtn').style.display = isEditMode ? 'block' : 'none';
  document.getElementById('addTagBtn').style.display = isEditMode ? 'inline-block' : 'none';
  document.getElementById('editPill').style.display = isEditMode ? 'inline-block' : 'none';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function attachItemListeners() {
  document.querySelectorAll('[data-edit-record]').forEach(btn => {
    btn.onclick = () => openRecordModal(btn.dataset.editRecord);
  });
  document.querySelectorAll('[data-del-record]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('이 성적을 삭제할까요?')) return;
      records = records.filter(r => r.id !== btn.dataset.delRecord);
      await saveRecords();
      render();
      showToast('삭제됐어요');
    };
  });
  document.querySelectorAll('[data-edit-school]').forEach(btn => {
    btn.onclick = () => openSchoolModal(btn.dataset.editSchool);
  });
  document.querySelectorAll('[data-del-school]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('이 학교를 삭제할까요?')) return;
      schools = schools.filter(s => s.id !== btn.dataset.delSchool);
      await saveSchools();
      render();
      showToast('삭제됐어요');
    };
  });
  document.querySelectorAll('[data-del-tag]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('이 태그를 삭제할까요?')) return;
      tags = tags.filter(t => t.id !== btn.dataset.delTag);
      await saveTags();
      render();
      showToast('삭제됐어요');
    };
  });
}

// ---------- record modal ----------
let editingRecordId = null;
function openRecordModal(id) {
  editingRecordId = id || null;
  const modal = document.getElementById('recordModal');
  if (id) {
    const r = records.find(x => x.id === id);
    document.getElementById('recordModalTitle').textContent = '성적 수정';
    document.getElementById('recYear').value = r.year;
    document.getElementById('recDesc').value = r.desc;
    document.getElementById('recBadgeText').value = r.badgeText;
    document.getElementById('recBadgeColor').value = r.badgeColor;
  } else {
    document.getElementById('recordModalTitle').textContent = '성적 추가';
    document.getElementById('recYear').value = '';
    document.getElementById('recDesc').value = '';
    document.getElementById('recBadgeText').value = '';
    document.getElementById('recBadgeColor').value = 'badge-rank';
  }
  modal.classList.add('show');
}

document.getElementById('addRecordBtn').onclick = () => openRecordModal(null);
document.getElementById('recordCancel').onclick = () => document.getElementById('recordModal').classList.remove('show');

document.getElementById('recordSubmit').onclick = async () => {
  const year = document.getElementById('recYear').value.trim();
  const desc = document.getElementById('recDesc').value.trim();
  const badgeText = document.getElementById('recBadgeText').value.trim();
  const badgeColor = document.getElementById('recBadgeColor').value;
  if (!year || !desc || !badgeText) {
    showToast('모든 항목을 입력해주세요');
    return;
  }
  if (editingRecordId) {
    const r = records.find(x => x.id === editingRecordId);
    r.year = year; r.desc = desc; r.badgeText = badgeText; r.badgeColor = badgeColor;
  } else {
    records.push({ id: 'r' + Date.now(), year, desc, badgeText, badgeColor });
  }
  await saveRecords();
  document.getElementById('recordModal').classList.remove('show');
  render();
  showToast('저장됐어요');
};

// ---------- school modal ----------
let editingSchoolId = null;
function openSchoolModal(id) {
  editingSchoolId = id || null;
  const modal = document.getElementById('schoolModal');
  if (id) {
    const s = schools.find(x => x.id === id);
    document.getElementById('schoolModalTitle').textContent = '학교 수정';
    document.getElementById('schPeriod').value = s.period;
    document.getElementById('schName').value = s.name;
  } else {
    document.getElementById('schoolModalTitle').textContent = '학교 추가';
    document.getElementById('schPeriod').value = '';
    document.getElementById('schName').value = '';
  }
  modal.classList.add('show');
}

document.getElementById('addSchoolBtn').onclick = () => openSchoolModal(null);
document.getElementById('schoolCancel').onclick = () => document.getElementById('schoolModal').classList.remove('show');

document.getElementById('schoolSubmit').onclick = async () => {
  const period = document.getElementById('schPeriod').value.trim();
  const name = document.getElementById('schName').value.trim();
  if (!period || !name) {
    showToast('모든 항목을 입력해주세요');
    return;
  }
  if (editingSchoolId) {
    const s = schools.find(x => x.id === editingSchoolId);
    s.period = period; s.name = name;
  } else {
    schools.push({ id: 's' + Date.now(), period, name });
  }
  await saveSchools();
  document.getElementById('schoolModal').classList.remove('show');
  render();
  showToast('저장됐어요');
};

// ---------- tag modal ----------
function openTagModal() {
  document.getElementById('tagModalTitle').textContent = '태그 추가';
  document.getElementById('tagEmoji').value = '';
  document.getElementById('tagText').value = '';
  document.getElementById('tagModal').classList.add('show');
}

document.getElementById('addTagBtn').onclick = openTagModal;
document.getElementById('tagCancel').onclick = () => document.getElementById('tagModal').classList.remove('show');

document.getElementById('tagSubmit').onclick = async () => {
  const emoji = document.getElementById('tagEmoji').value.trim();
  const text = document.getElementById('tagText').value.trim();
  if (!text) {
    showToast('텍스트를 입력해주세요');
    return;
  }
  tags.push({ id: 'tg' + Date.now(), emoji, text });
  await saveTags();
  document.getElementById('tagModal').classList.remove('show');
  render();
  showToast('저장됐어요');
};

// ---------- password unlock ----------
function checkEditKey() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('key') === 'admin') {
    document.getElementById('pwModal').classList.add('show');
  }
}

document.getElementById('pwCancel').onclick = () => document.getElementById('pwModal').classList.remove('show');
document.getElementById('pwSubmit').onclick = () => {
  const val = document.getElementById('pwInput').value;
  if (val === EDIT_PASSWORD) {
    isEditMode = true;
    document.getElementById('pwModal').classList.remove('show');
    render();
    showToast('편집 모드 켜짐');
  } else {
    showToast('비밀번호가 틀렸어요');
  }
  document.getElementById('pwInput').value = '';
};
document.getElementById('pwInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('pwSubmit').click();
});

loadData();
checkEditKey();
</script>

</body>
</html>
